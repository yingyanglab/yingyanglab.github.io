<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Academic homepage">
  <title>Academic Homepage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header" id="home">
    <nav class="nav container" aria-label="Primary navigation">
      <a class="brand" href="#home" aria-label="Home">
        <span class="brand-mark" id="brand-mark"></span>
        <span class="brand-name" id="brand-name"></span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links" aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="nav-links"></div>
    </nav>

    <div class="hero container">
      <div class="hero-copy reveal">
        <p class="eyebrow" id="hero-eyebrow"></p>
        <h1><span id="hero-title"></span><br><em id="hero-title-emphasis"></em></h1>
        <p class="hero-intro" id="hero-subtitle"></p>
        <div class="hero-actions" id="hero-actions"></div>
        <div class="profile-links profile-links-hero" id="hero-profile-links" aria-label="Academic profiles and contact"></div>
      </div>
      <div class="hero-visual reveal">
        <div class="micrograph"><img id="hero-image" alt=""></div>
        <span class="figure-label" id="hero-image-label"></span>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section about" id="about">
      <div class="container split-grid">
        <div class="section-heading reveal">
          <p class="section-number" id="about-label"></p>
          <h2 id="about-heading"></h2>
        </div>
        <div class="about-copy reveal">
          <p class="lead" id="about-lead"></p>
          <div id="biographies"></div>
          <a class="orcid-link" id="about-orcid" target="_blank" rel="noopener noreferrer"><span class="orcid-icon" aria-hidden="true">iD</span><span></span></a>
          <dl class="facts" id="facts"></dl>
        </div>
      </div>
    </section>

    <section class="section research" id="research">
      <div class="container">
        <div class="section-heading heading-row reveal">
          <div><p class="section-number" id="research-label"></p><h2 id="research-heading"></h2></div>
          <p id="research-intro"></p>
        </div>
        <div class="research-grid" id="research-directions"></div>
        <div class="research-results" id="research-highlights">
          <div class="results-heading reveal"><p class="section-number" id="highlights-label"></p><h3 id="highlights-heading"></h3></div>
          <div class="results-grid" id="highlights-grid"></div>
        </div>
      </div>
    </section>

    <section class="section publications" id="publications">
      <div class="container split-grid">
        <div class="section-heading reveal">
          <p class="section-number" id="publications-label"></p>
          <h2 id="publications-heading"></h2>
          <div class="academic-links publication-links" id="publication-profile-links" aria-label="Publication profiles and contact"></div>
        </div>
        <div class="publication-list reveal">
          <div class="publication-group">
            <div class="publication-group-heading"><p id="selected-heading"></p><span id="selected-note"></span></div>
            <div id="selected-publications"></div>
          </div>
          <div class="publication-group full-list">
            <div class="publication-group-heading"><p id="full-heading"></p><span id="full-note"></span></div>
            <p class="verification-note" id="verification-note"></p>
            <ol id="full-publications"></ol>
          </div>
        </div>
      </div>
    </section>

    <section class="section team" id="team">
      <div class="container">
        <div class="section-heading heading-row reveal">
          <div><p class="section-number" id="team-label"></p><h2 id="team-heading"></h2></div>
          <p id="team-intro"></p>
        </div>
        <div class="team-grid reveal" id="team-grid"></div>
        <aside class="opportunities-panel reveal" id="opportunities">
          <div><p class="section-number" id="opportunities-label"></p><h3 id="opportunities-heading"></h3></div>
          <div><p id="opportunities-text"></p><a class="button button-primary" id="opportunities-link"></a></div>
        </aside>
      </div>
    </section>

    <section class="section contact" id="contact">
      <div class="container contact-grid">
        <div class="section-heading reveal"><p class="section-number" id="contact-label"></p><h2><span id="contact-heading-1"></span><br><span id="contact-heading-2"></span></h2></div>
        <div class="contact-details reveal">
          <p id="contact-intro"></p>
          <dl id="contact-list"></dl>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-inner"><p>© <span id="year"></span> <span id="footer-name"></span></p><p id="footer-institution"></p><a href="#home" id="back-to-top"></a></div>
  </footer>
  <noscript><p class="load-error">This website requires JavaScript to load its content.</p></noscript>
  <script src="script.js"></script>
</body>
</html>
